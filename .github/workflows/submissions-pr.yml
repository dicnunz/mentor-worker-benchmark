name: Submissions PR Check

on:
  pull_request:
    paths:
      - "submissions/**"

permissions:
  contents: write

jobs:
  verify-and-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify changed submission zips
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.sha }}"
          CHANGED="$(
            git diff --name-only --diff-filter=AM "${BASE_SHA}" "${HEAD_SHA}" -- submissions \
              | grep -E '\.zip$' || true
          )"

          if [[ -z "${CHANGED}" ]]; then
            echo "No changed submission zip files detected."
            exit 0
          fi

          echo "Changed submissions:"
          echo "${CHANGED}"
          while IFS= read -r file; do
            [[ -z "${file}" ]] && continue
            python -m mentor_worker_benchmark verify --submission "${file}"
          done <<< "${CHANGED}"

      - name: Regenerate community leaderboard artifacts
        run: |
          python scripts/build_community_leaderboard.py --strict

      - name: Commit refreshed artifacts (same-repo PRs)
        if: github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- leaderboard docs/index.html docs/leaderboard.md; then
            echo "Leaderboard artifacts already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add leaderboard docs/index.html docs/leaderboard.md
          git commit -m "chore: refresh community leaderboard artifacts"
          git push

      - name: Fork PR note
        if: github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "Artifacts regenerated for validation only (fork PR cannot auto-push)."
