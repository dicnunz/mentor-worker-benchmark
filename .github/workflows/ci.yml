name: CI

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Unit tests (benchmark code)
        run: python -m pytest tests -q

      - name: Validate task pack metadata + structure
        run: python -m mentor_worker_benchmark.tasks.task_pack_v1.validate

      - name: Sanity check (quick subset, no Ollama)
        run: python -m mentor_worker_benchmark sanity --task-pack task_pack_v1 --suite quick --seed 1337
