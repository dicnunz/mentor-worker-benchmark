name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Unit tests (benchmark code)
        run: python -m pytest tests -q

      - name: Validate task packs metadata + structure
        run: python -m mentor_worker_benchmark.tasks.task_pack_v1.validate

      - name: Validate task pack v2 metadata + structure
        run: python -m mentor_worker_benchmark.tasks.task_pack_v2.validate

      - name: Sanity check v2 quick subset (no Ollama)
        run: python -m mentor_worker_benchmark sanity --task-pack task_pack_v2 --suite quick --seed 1337

  docker-sanity:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and run Docker sanity image
        run: DOCKER_IMAGE_TAG=mentor-worker-benchmark:ci ./scripts/docker_sanity.sh
